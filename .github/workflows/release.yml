name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create GitHub releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag matches package version
        run: |
          PKG=$(python -c "import omada_cli; print(omada_cli.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          test "$PKG" = "$TAG" || { echo "::error::tag $TAG != version $PKG"; exit 1; }

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      # To also publish to PyPI, configure Trusted Publishing for this repo and
      # uncomment:
      # - uses: pypa/gh-action-pypi-publish@release/v1
